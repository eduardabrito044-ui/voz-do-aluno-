<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Ouvidoria - CETI José Marques</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo-container">
            <h1>Ouvidoria</h1>
        </div>
        <div class="nav-buttons">
            <button id="btn-forum" class="active-btn" onclick="mudarAba('forum')">💬 Chat</button>
            <button id="btn-mural" onclick="mudarAba('mural')">💡 Mural</button>
            <button id="btn-sentimentos" onclick="mudarAba('sentimentos')">🎭 Humor</button>
            <button id="btn-feedback" onclick="mudarAba('feedback')">🏫 Opinião</button>
            <button id="btn-contatos" onclick="mudarAba('contatos')">📞 Contatos</button>
        </div>
    </nav>

    <main class="main-content">
        <section id="forum" class="aba active">
            <div class="header-fixo">
                <h2>Direct dos Alunos</h2>
            </div>
            <div id="feed-forum" class="feed"></div>
            
            <div class="footer-input">
                <div class="input-container">
                    <input type="text" id="input-msg" placeholder="Enviar mensagem...">
                    <button class="send-btn" onclick="salvarMensagem()">Enviar</button>
                </div>
            </div>
        </section>

        <section id="mural" class="aba">
            <div class="header-fixo"><h2>Mural de Ideias</h2></div>
            <div id="feed-mural" class="feed"></div>
            <div class="footer-input">
                <div class="input-container">
                    <input type="text" id="input-ideia" placeholder="Sua sugestão...">
                    <button class="send-btn" onclick="salvarIdeia()">Sugerir</button>
                </div>
            </div>
        </section>

        <section id="sentimentos" class="aba">
            <div class="header-fixo"><h2>Como você está hoje?</h2></div>
            <div class="content-scroll">
                <div class="emoji-grid">
                    <button onclick="votarHumor('😊')">😊</button>
                    <button onclick="votarHumor('😴')">😴</button>
                    <button onclick="votarHumor('🤓')">🤓</button>
                    <button onclick="votarHumor('🤩')">🤩</button>
                    <button onclick="votarHumor('😡')">😡</button>
                    <button onclick="votarHumor('🥰')">🥰</button>
                </div>
            </div>
        </section>

        <section id="feedback" class="aba">
            <div class="header-fixo"><h2>Sua Opinião</h2></div>
            <div class="content-scroll">
                <textarea id="texto-feedback" placeholder="O que você mudaria na escola?"></textarea>
                <button class="btn-insta" onclick="enviarFeedback()">Enviar Feedback</button>
            </div>
        </section>

        <section id="contatos" class="aba">
            <div class="header-fixo"><h2>Contatos</h2></div>
            <div class="content-scroll">
                <a href="https://wa.me/5589981259467" class="btn-insta wa">WhatsApp Oficial</a>
                <a href="https://instagram.com/m.eduarda.brito25" class="btn-insta ig">Instagram</a>
            </div>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
